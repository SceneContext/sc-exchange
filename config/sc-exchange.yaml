# sc-exchange PBS configuration
# SceneContext RTD exchange — contextual CTV enrichment
#
# Loaded from /etc/config/ by PBS (Viper).
# Override any value with PBS_ env vars:
#   PBS_PORT=8000
#   PBS_HOOKS_MODULES_SCENECONTEXT_RTD_ENDPOINT=http://bidder:8000/bid

host: 0.0.0.0
port: 8000
admin_port: 6060

# Required — set to 0 to disable GDPR by default (contextual only, no user data)
gdpr:
  default_value: "0"

# ---------------------------------------------------------------------------
# Hooks — scenecontext/rtd module
# ---------------------------------------------------------------------------
hooks:
  enabled: true
  modules:
    scenecontext:
      rtd:
        enabled: true
        endpoint: "http://bidder:8000/bid"  # sc-vespa bidder (Docker internal)
        timeout_ms: 8                        # fail-open — never blocks auction
  host_execution_plan:
    endpoints:
      /openrtb2/auction:
        stages:
          processed-auction-request:
            groups:
              - timeout: 8
                hook_sequence:
                  - module_code: "scenecontext.rtd"
                    hook_impl_code: "scenecontext_rtd_processed_auction"

# ---------------------------------------------------------------------------
# Adapters — demand partners receiving enriched bid requests
# ---------------------------------------------------------------------------
adapters:
  pubmatic:
    endpoint: "https://hbopenbid.pubmatic.com/translator?source=prebid-server"
  smartadserver:
    endpoint: "https://prg.smartadserver.com/prebid/v1"
  appnexus:
    endpoint: "http://ib.adnxs.com/openrtb2"
  ix:
    endpoint: "https://htlb.casalemedia.com/openrtb/pbjs"
  ttd:
    endpoint: "https://direct.adsrvr.org/bid/prebid/"
  rubicon:
    endpoint: "http://exapi-us-east.rubiconproject.com/a/api/exchange.json"

# ---------------------------------------------------------------------------
# Metrics — Prometheus scrape at :9090/metrics
# ---------------------------------------------------------------------------
metrics:
  prometheus:
    port: 9090
    namespace: sc_exchange
    subsystem: prebid
    timeout_ms: 100

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: info
